<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Analyzer Pro v4.0.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🔍 Parser Assistant <span class="ver">v4.0.0</span></h1>
    <p class="desc">Engine Detection • Worker Whitelist • Smart Extractor • Code Gen</p>

    <!-- Настройки -->
    <div class="settings-grid">
        <div class="worker-block">
            <label for="workerUrl">⚡ Cloudflare Worker Proxy</label>
            <input type="text" id="workerUrl" value="https://zonaproxy.777b737.workers.dev" placeholder="https://myproxy.workers.dev">
            <p class="hint">Используется для обхода CORS при глубоком анализе.</p>
        </div>
        
        <div class="expert-toggle">
            <label class="switch">
                <input type="checkbox" id="expertMode">
                <span class="slider"></span>
            </label>
            <span>Expert Mode (DOM Stats)</span>
        </div>
    </div>

    <!-- Основной ввод -->
    <div class="main-input-group">
        <input type="text" id="targetUrl" placeholder="https://example.com/video/..." value="">
        <button id="btnAnalyze" onclick="runAnalysis()">🚀 Начать анализ</button>
    </div>

    <div id="status" class="status"></div>
    
    <!-- Индикаторы и прогресс -->
    <div class="progress-wrapper">
        <div id="progressBar" class="progress-bar"></div>
        <div id="progressText" class="progress-text">Ожидание...</div>
    </div>

    <!-- Инструменты Воркера (NEW) -->
    <div id="workerTools" class="worker-tools-box" style="display:none">
        <div class="tool-header">
            <h3>📋 Worker Configuration</h3>
            <button class="btn-copy" onclick="copyWhitelist()">Копировать домены</button>
        </div>
        <div id="whitelistBox" class="whitelist-box"></div>
        <p class="hint">Добавьте эти домены в <code>ALLOWED_TARGETS</code> вашего воркера.</p>
    </div>

    <!-- Результаты -->
    <div id="results" class="results-area" style="display:none">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('smart')">💎 Smart Extractor</button>
            <button class="tab" onclick="switchTab('logic')">🧠 Parser Logic</button>
            <button class="tab" onclick="switchTab('raw')">📦 Raw Data</button>
        </div>

        <!-- Таб: Smart Extractor -->
        <div id="tab-smart" class="tab-content active">
            <div id="healthReport"></div>
            <div id="qualityMapper"></div>
        </div>

        <!-- Таб: Parser Logic -->
        <div id="tab-logic" class="tab-content">
            <div class="code-gen-header">
                <h4>Generated extractQualities() template:</h4>
                <button onclick="copyParserCode()">Copy Code</button>
            </div>
            <pre id="parserTemplate" class="code-box"></pre>
        </div>

        <!-- Таб: Raw -->
        <div id="tab-raw" class="tab-content">
            <pre id="jsonOutput"></pre>
        </div>
    </div>
</div>
<script src="parser.js"></script>
</body>
</html>
