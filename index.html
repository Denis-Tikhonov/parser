<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Parser Expert v4.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Media Analyzer <span class="badge">v4.0 PRO</span></h1>
            <div class="tabs">
                <button class="tab-btn active" data-tab="main">Анализатор</button>
                <button class="tab-btn" data-tab="devtools">Dev Tools (Config)</button>
                <button class="tab-btn" data-tab="trace">Трассировка</button>
            </div>
        </header>

        <main>
            <section id="main" class="tab-content active">
                <div class="input-group">
                    <input type="text" id="targetUrl" placeholder="https://example.com/video/123...">
                    <button id="analyzeBtn">Анализировать</button>
                </div>
                
                <div id="statusPanel" class="hidden">
                    <div class="warning-box" id="tokenWarning">
                        ⚠️ <strong>Внимание:</strong> Обнаружены динамические токены (Time-bound). Обрезка параметров запрещена.
                    </div>
                    <div class="info-grid">
                        <div class="card">
                            <h3>Whitelist Домены</h3>
                            <ul id="whitelistResult"></ul>
                        </div>
                        <div class="card">
                            <h3>Path Pattern</h3>
                            <code id="pathPattern">/videos/{id}/</code>
                        </div>
                    </div>
                </div>

                <div class="results-layout">
                    <div id="extractionLog"></div>
                </div>
            </section>

            <section id="devtools" class="tab-content">
                <div class="config-header">
                    <h3>Worker JS Generator</h3>
                    <button onclick="copyConfig()">Копировать код</button>
                </div>
                <pre id="workerCode">// Выберите видео для генерации конфига...</pre>
                
                <div class="expert-mode-toggle">
                    <label>
                        <input type="checkbox" id="hideNoise" checked> Скрывать избыточные элементы (scripts/div)
                    </label>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
