<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Structure Analyzer v3.3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🔍 Site Structure Analyzer <span class="ver">v3.3</span></h1>
    <p class="desc">Глубокий анализ архитектуры — JS-парсинг категорий, поиска, сортировки, URL-схемы</p>

    <!-- Worker -->
    <div class="worker-block">
        <div class="worker-block-header">
            <label for="workerUrl">⚡ Worker</label>
            <span id="workerStatusBadge" class="worker-badge inactive">○</span>
        </div>
        <div class="worker-input-row">
            <input type="text" id="workerUrl" placeholder="https://myproxy.workers.dev" autocomplete="off" spellcheck="false">
        </div>
        <p class="worker-hint">Приоритетный транспорт. <code>?mode=extract</code>. localStorage.</p>
    </div>

    <!-- URL + Test word -->
    <div class="input-row-2">
        <div class="input-group flex-3">
            <label for="targetUrl">URL:</label>
            <input type="text" id="targetUrl" placeholder="https://example.com/" value="">
        </div>
        <div class="input-group flex-1">
            <label for="testWord">Тестовое слово:</label>
            <input type="text" id="testWord" value="wife" placeholder="wife">
        </div>
    </div>

    <!-- Proxy + UA -->
    <div class="input-row-2">
        <div class="input-group flex-2">
            <label for="proxySelect">Прокси:</label>
            <select id="proxySelect">
                <option value="auto" selected>🔄 Авто</option>
                <option value="">🔗 Прямой</option>
                <option value="https://api.allorigins.win/raw?url=">allorigins</option>
                <option value="https://corsproxy.io/?">corsproxy</option>
                <option value="https://api.codetabs.com/v1/proxy?quest=">codetabs</option>
                <option value="https://thingproxy.freeboard.io/fetch/">thingproxy</option>
                <option value="https://cors-anywhere.herokuapp.com/">cors-anywhere</option>
                <option value="https://cors.bridged.cc/">cors.bridged</option>
            </select>
        </div>
        <div class="input-group flex-2">
            <label for="uaSelect">User-Agent:</label>
            <select id="uaSelect">
                <option value="desktop" selected>🖥 Desktop</option>
                <option value="mobile">📱 Mobile</option>
                <option value="bot">🤖 Bot</option>
                <option value="custom">✏️ Custom</option>
            </select>
            <input type="text" id="uaCustom" class="ua-custom" placeholder="Mozilla/5.0 ..." style="display:none">
        </div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
        <button id="btnAnalyze" onclick="runFullAnalysis()">🚀 Полный анализ</button>
        <button id="btnCopyJson" onclick="copyResults()" disabled>📋 JSON</button>
        <button id="btnCopyArch" onclick="copyArchitecture()" disabled>🏗️ Архитектура</button>
    </div>

    <div id="corsIndicator" class="cors-indicator" style="display:none"></div>
    <div id="status" class="status"></div>
    <div id="progress-container" class="progress-container" style="display:none">
        <div id="progress-bar" class="progress-bar"></div>
        <span id="progress-text" class="progress-text">0%</span>
    </div>

    <!-- Results -->
    <div id="results" class="results" style="display:none">
        <h2>📊 Результаты</h2>
        <div class="tabs">
            <button class="tab active" onclick="showTab('arch')">🏗️ Архитектура</button>
            <button class="tab" onclick="showTab('formatted')">JSON</button>
            <button class="tab" onclick="showTab('raw')">Raw</button>
            <button class="tab" onclick="showTab('visual')">Визуальный</button>
        </div>
        <div id="tab-arch" class="tab-content active"><div id="archReport"></div></div>
        <div id="tab-formatted" class="tab-content"><pre id="jsonFormatted"></pre></div>
        <div id="tab-raw" class="tab-content"><textarea id="jsonRaw" readonly></textarea></div>
        <div id="tab-visual" class="tab-content"><div id="visualReport"></div></div>
    </div>
</div>
<script src="parser.js"></script>
</body>
</html>
